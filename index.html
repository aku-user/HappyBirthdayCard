<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spline 3D Scene</title>
<script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.97/build/spline-viewer.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  body {
    background: linear-gradient(135deg, #1e1b4b 0%, #4c1d95 45%, #7e22ce 100%);
    position: relative;
  }
  spline-viewer {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Tombol Mulai */
  .start-btn {
    position: absolute;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;

    padding: 16px 44px;
    font-size: 18px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 0.5px;
    text-decoration: none;

    background: linear-gradient(135deg, #a855f7, #6d28d9);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 999px;
    box-shadow: 0 8px 30px rgba(124, 58, 237, 0.5);

    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .start-btn:hover {
    transform: translateX(-50%) translateY(-3px);
    box-shadow: 0 12px 36px rgba(124, 58, 237, 0.7);
  }
  .start-btn:active {
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
  <spline-viewer url="https://prod.spline.design/N0lh-DueGYBmFGdx/scene.splinecode"></spline-viewer>

  <!-- GANTI href di bawah ini dengan link tujuan kamu -->
  <a class="start-btn" href="index.html" target="_blank" rel="noopener">
    Mulai
  </a>
</body>
</html>
